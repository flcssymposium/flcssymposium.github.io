<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【公開シンポジウム】次期学習指導要領をどうする!?ー外国語教育の視点からー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Reggae+One&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            900: '#002060',
                            800: '#003399',
                        },
                        accent: {
                            gold: '#D4AF37',
                            sky: '#00BFFF',
                            cyan: '#00FFFF',
                        },
                        cream: '#FDFDD0',
                    },
                    fontFamily: {
                        sans: ['Noto Sans JP', 'sans-serif'],
                        serif: ['Noto Serif JP', 'serif'],
                        reggae: ['"Reggae One"', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .title-glow {
            filter: drop-shadow(0 0 8px rgba(253, 253, 208, 0.6));
        }
        .hero-background {
            background-color: #002060; 
            background-image: url('https://flcssymposium.github.io/back.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 font-sans leading-relaxed">

    <header class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-200">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-center items-center h-20">
                <div class="flex-shrink-0 flex flex-col items-center justify-center h-full py-1 text-center">
                    <span class="font-sans text-[10px] md:text-xs font-bold tracking-widest text-navy-900 mb-1">
                        【公開シンポジウム】
                    </span>
                    <span class="font-reggae text-lg md:text-xl text-accent-gold leading-none tracking-tight">
                        次期学習指導要領をどうする!?
                    </span>
                    <span class="font-reggae text-xs md:text-sm text-accent-gold leading-tight tracking-tight -mt-1 opacity-90">
                        <span class="inline-block -scale-x-100">---</span> 外国語教育の視点から ---
                    </span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="relative min-h-screen flex items-center justify-center pt-24 pb-20 overflow-hidden">
            <div class="absolute inset-0 hero-background z-0"></div>
            
            <div class="relative z-10 w-full max-w-5xl mx-auto px-4 text-center mt-10">
                <div class="flex flex-col items-center gap-2 mb-10 animate-fade-in-up">
                    <p class="text-white text-xl md:text-2xl font-bold tracking-widest font-sans mb-3">
                        【公開シンポジウム】
                    </p>
                    <h1 class="text-5xl md:text-8xl font-normal text-cream tracking-tight font-reggae leading-[1.2] title-glow">
                        次期学習指導要領を<br class="hidden md:block">どうする!?
                    </h1>
                    <p class="text-cream text-2xl md:text-3xl font-normal tracking-wider font-reggae mt-4 title-glow">
                        <span class="inline-block -scale-x-100 opacity-80">---</span> 外国語教育の視点から <span class="opacity-80">---</span>
                    </p>
                </div>
                
                <div class="w-full max-w-4xl mx-auto mb-12 px-0 md:px-4 animate-fade-in-up" style="animation-delay: 0.1s;">
                    <img src="https://flcssymposium.github.io/photos_pre.png" alt="登壇者やイメージ写真" class="w-full h-auto drop-shadow-2xl mx-auto">
                </div>
                
                <div class="flex flex-wrap justify-center gap-4 mb-10 animate-fade-in-up" style="animation-delay: 0.2s;">
                    <div class="glass-card px-12 py-8 rounded-3xl text-center shadow-2xl border-b-4 border-accent-gold">
                        <p class="text-navy-900 font-black text-3xl md:text-5xl tracking-widest">近日公開</p>
                        <p class="text-navy-800 font-bold text-xl md:text-2xl mt-4 tracking-wider">乞うご期待!!</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <aside class="bg-navy-900 py-12">
        </aside>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate-fade-in-up');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate-fade-in-up').forEach(el => {
            observer.observe(el);
        });
    </script>
</body>
</html>
